<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0F0F0F">
    <title>Luna Bar | Carta Digital</title>
    <link rel="preload" as="image" href="assets/mockup.webp">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app-shell">
      <section class="screen landing-screen is-active" id="landingScreen" aria-label="Inicio Luna Bar">
        <div class="landing-bg" aria-hidden="true">
          <img src="assets/mockup.webp" alt="">
        </div>

        <div class="landing-content">
          <div class="brand-mark" aria-hidden="true"></div>
          <h1>Luna Bar</h1>
          <p class="landing-subtitle">Tapas, platos combinados y cocina china</p>

          <div class="featured-slider" id="featuredSlider" aria-live="polite"></div>

          <button class="primary-action" type="button" id="openMenuButton">Ver carta</button>
        </div>
      </section>

      <section class="screen menu-screen" id="menuScreen" aria-label="Carta Luna Bar" aria-hidden="true">
        <header class="menu-header">
          <button class="home-button" type="button" id="homeButton">Inicio</button>
          <div>
            <p class="menu-kicker">Carta digital</p>
            <h2>Luna Bar</h2>
          </div>
        </header>

        <main class="menu-content">
          <div class="section-summary" id="sectionSummary"></div>
          <div class="product-grid" id="productGrid"></div>
          <div id="sectionNotice"></div>
        </main>

        <nav class="bottom-tabs" aria-label="Categorías de la carta">
          <div class="bottom-tabs__track" id="bottomTabs"></div>
        </nav>
      </section>
    </div>

    <div class="modal" id="productModal" aria-hidden="true">
      <div class="modal__backdrop" data-close-modal></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal__close" type="button" aria-label="Cerrar" data-close-modal>×</button>
        <div class="modal__content" id="modalContent"></div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
